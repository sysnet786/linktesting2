<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <!-- Meta tags for external app launch -->
    <meta http-equiv="refresh" content="0; url=https://tally.so/r/vGrBzD">
    
    <title>Open in Chrome - Multiple Methods</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 32px 24px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        h2 {
            color: #1a1a2e;
            margin-bottom: 8px;
            font-size: 22px;
        }
        .sub {
            color: #666;
            font-size: 13px;
            margin-bottom: 24px;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }
        .btn {
            padding: 14px 20px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: transform 0.1s;
            width: 100%;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-primary {
            background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(66,133,244,0.3);
        }
        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 1px solid #ddd;
        }
        .btn-warning {
            background: #ff9800;
            color: white;
        }
        .btn-danger {
            background: #ea4335;
            color: white;
        }
        .divider {
            margin: 20px 0;
            border-top: 1px solid #eee;
            padding-top: 16px;
            font-size: 12px;
            color: #999;
        }
        .status {
            margin-top: 16px;
            padding: 10px;
            border-radius: 10px;
            font-size: 12px;
            background: #f0f4ff;
            color: #1565c0;
        }
        .note {
            background: #fff8e1;
            padding: 12px;
            border-radius: 12px;
            font-size: 11px;
            color: #856404;
            margin-top: 16px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">🌐</div>
    <h2>Open Tally Form in Chrome</h2>
    <p class="sub">Image / PDF upload ke liye</p>

    <div class="btn-group">
        
        <!-- Method 1: Intent Scheme -->
        <button class="btn btn-primary" onclick="methodIntent()">
            🔥 Method 1: Intent Scheme
        </button>
        
        <!-- Method 2: Google Chrome Custom Scheme -->
        <button class="btn btn-secondary" onclick="methodGoogleChrome()">
            🌐 Method 2: googlechrome:// Scheme
        </button>
        
        <!-- Method 3: Android App Link -->
        <button class="btn btn-secondary" onclick="methodAppLink()">
            📱 Method 3: Android App Link
        </button>
        
        <!-- Method 4: JavaScript Force Open -->
        <button class="btn btn-warning" onclick="methodForceOpen()">
            ⚡ Method 4: Force Open (Multiple Triggers)
        </button>
        
        <!-- Method 5: Hidden Iframe + Redirect -->
        <button class="btn btn-danger" onclick="methodIframeHack()">
            🎯 Method 5: Iframe + Redirect Hack
        </button>
        
    </div>

    <div class="divider">─ OR ─</div>
    
    <button class="btn btn-secondary" onclick="copyUrl()">
        📋 Copy Link (Manual Paste)
    </button>

    <div id="status" class="status">
        ⏳ Koi bhi button try karein
    </div>

    <div class="note">
        💡 <strong>Note:</strong> Kisi na kisi method se Chrome open ho jana chahiye.<br>
        Agar sab fail ho jaye toh "Copy Link" use karein.
    </div>
</div>

<script>
const TALLY_URL = "https://tally.so/r/vGrBzD";

function showStatus(msg, isError = false) {
    const statusDiv = document.getElementById('status');
    statusDiv.innerHTML = msg;
    statusDiv.style.background = isError ? '#ffebee' : '#e8f5e9';
    statusDiv.style.color = isError ? '#c62828' : '#2e7d32';
    setTimeout(() => {
        statusDiv.style.background = '#f0f4ff';
        statusDiv.style.color = '#1565c0';
        statusDiv.innerHTML = '✅ Koi bhi button try karein';
    }, 3000);
}

// Method 1: Intent Scheme
function methodIntent() {
    showStatus('🔄 Trying Intent Scheme...');
    const intentUrl = "intent://tally.so/r/vGrBzD#Intent;scheme=https;package=com.android.chrome;end";
    window.location.href = intentUrl;
    
    setTimeout(() => {
        showStatus('⚠️ Intent failed, trying fallback...', true);
        window.location.href = TALLY_URL;
    }, 800);
}

// Method 2: Google Chrome Custom Scheme
function methodGoogleChrome() {
    showStatus('🔄 Trying googlechrome:// scheme...');
    window.location.href = "googlechrome://navigate?url=" + encodeURIComponent(TALLY_URL);
    
    setTimeout(() => {
        showStatus('⚠️ googlechrome:// failed, trying normal link...', true);
        window.location.href = TALLY_URL;
    }, 800);
}

// Method 3: Android App Link (Chrome package direct)
function methodAppLink() {
    showStatus('🔄 Trying Android App Link...');
    const appLink = "android-app://com.android.chrome/https/tally.so/r/vGrBzD";
    window.location.href = appLink;
    
    setTimeout(() => {
        showStatus('⚠️ App link failed, trying fallback...', true);
        window.location.href = TALLY_URL;
    }, 800);
}

// Method 4: Force Open - Multiple triggers at once
function methodForceOpen() {
    showStatus('🔄 Force opening with multiple triggers...');
    
    const intentUrl = "intent://tally.so/r/vGrBzD#Intent;scheme=https;package=com.android.chrome;end";
    const googleChrome = "googlechrome://navigate?url=" + encodeURIComponent(TALLY_URL);
    const appLink = "android-app://com.android.chrome/https/tally.so/r/vGrBzD";
    
    // Trigger all at once
    window.location.href = intentUrl;
    
    setTimeout(() => {
        window.location.href = googleChrome;
    }, 100);
    
    setTimeout(() => {
        window.location.href = appLink;
    }, 200);
    
    setTimeout(() => {
        window.location.href = TALLY_URL;
    }, 800);
}

// Method 5: Hidden Iframe + Redirect Hack
function methodIframeHack() {
    showStatus('🔄 Trying iframe hack...');
    
    const intentUrl = "intent://tally.so/r/vGrBzD#Intent;scheme=https;package=com.android.chrome;end";
    
    // Create hidden iframe
    var iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    iframe.src = intentUrl;
    document.body.appendChild(iframe);
    
    // Also try to redirect
    window.location.href = intentUrl;
    
    // Remove iframe after 1 second
    setTimeout(() => {
        if (iframe) iframe.remove();
    }, 1000);
    
    // Fallback
    setTimeout(() => {
        showStatus('⚠️ Iframe hack failed, trying normal link...', true);
        window.location.href = TALLY_URL;
    }, 800);
}

// Copy URL method (fallback)
function copyUrl() {
    navigator.clipboard.writeText(TALLY_URL).then(() => {
        const btn = document.querySelector('.btn-secondary:last-of-type');
        const original = btn.innerHTML;
        btn.innerHTML = '✅ Copied!';
        showStatus('✅ Link copied! Open Chrome and paste.');
        setTimeout(() => { btn.innerHTML = original; }, 2000);
    }).catch(() => {
        alert('Copy failed: ' + TALLY_URL);
    });
}

// Auto-run all methods on page load? (Optional)
window.onload = function() {
    showStatus('✅ Page loaded. Try any button above.');
};
</script>

</body>
</html>
