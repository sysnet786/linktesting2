<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open in Chrome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px 24px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h2 {
            color: #1a1a2e;
            margin-bottom: 12px;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .chrome-btn {
            background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
            color: white;
            border: none;
            padding: 16px 28px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(66,133,244,0.3);
        }
        .chrome-btn:active {
            transform: scale(0.97);
        }
        .copy-btn {
            background: #f5f5f5;
            color: #333;
            border: 1px solid #ddd;
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 14px;
            width: 100%;
            cursor: pointer;
            margin-top: 12px;
        }
        .note {
            background: #fff8e1;
            padding: 12px;
            border-radius: 12px;
            font-size: 12px;
            color: #856404;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">🌐</div>
    <h2>Open in Chrome new</h2>
    <p>Image / PDF upload ke liye<br>Chrome mein open karein</p>
    
    <!-- Yeh button Chrome kholega -->
    <button class="chrome-btn" onclick="openInChrome()">
        🔓 Chrome Mein Open Karein
    </button>
    
    <button class="copy-btn" onclick="copyUrl()">
        📋 Copy Link (Alternative)
    </button>
    
    <div class="note">
        💡 Button tap karte hi Chrome open ho jayega.<br>
        Agar nahi khulta toh copy karke manually paste karein.
    </div>
</div>

<script>
function openInChrome() {
    // Tally form ka URL
    const tallyUrl = "https://tally.so/r/vGrBzD";
    
    // 🔥 Chrome open karne ka tarika
    // Method 1: Intent URL (try karo)
    window.location.href = "intent://tally.so/r/vGrBzD#Intent;scheme=https;package=com.android.chrome;end";
    
    // Method 2: Fallback - normal link (agar intent fail ho to)
    setTimeout(function() {
        window.location.href = tallyUrl;
    }, 500);
}

function copyUrl() {
    const url = "https://tally.so/r/vGrBzD";
    navigator.clipboard.writeText(url).then(() => {
        const btn = document.querySelector('.copy-btn');
        const original = btn.innerHTML;
        btn.innerHTML = '✅ Copied!';
        setTimeout(() => { btn.innerHTML = original; }, 2000);
    }).catch(() => {
        alert('Copy failed: ' + url);
    });
}
</script>

</body>
</html>
